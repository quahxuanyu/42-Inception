<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sample Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f9f9f9;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>HELLO to My ASJODJAISDOIJ Webpage</h1>
        <p>This is a simple HTML page with some basic styling. You can use this as a starting point for your own
            projects.</p>
    </div>
</body>
